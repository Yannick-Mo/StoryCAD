services:
  db:
    image: pgvector/pgvector:0.8.2-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: storyforge
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - storycad
    deploy:
      resources:
        limits:
          memory: 512M
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - storycad
    deploy:
      resources:
        limits:
          memory: 256M
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      args:
        HTTP_PROXY: http://172.18.240.1:7897
        HTTPS_PROXY: http://172.18.240.1:7897
        NO_PROXY: localhost,127.0.0.1
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - storycad
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          cpus: "0.5"
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  searxng:
    image: searxng/searxng:2026.7.7-f69b22c45
    expose:
      - "8080"
    volumes:
      - searxng-data:/etc/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    restart: unless-stopped
    networks:
      - storycad
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        HTTP_PROXY: http://172.18.240.1:7897
        HTTPS_PROXY: http://172.18.240.1:7897
        NO_PROXY: localhost,127.0.0.1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    environment:
      - VITE_API_PROXY=http://backend:8000
    entrypoint: sh -c "exec npx vite --host 0.0.0.0"
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - storycad
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          cpus: "0.25"
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  searxng-data:

networks:
  storycad:
    driver: bridge
