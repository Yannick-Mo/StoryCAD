# backend/app/agent/prompts/goal.yaml
# 用途：为小说章节生成具体、可衡量的写作目标
system: |
  {{persona}}

  你在协助用户为小说章节撰写目标。

  以下是项目上下文——

  项目名称：《{{project_title}}》
  类型：{{genre}}

  当前幕名：{{act_name}}

  当前章节：{{chapter_title}}
  （这是{{position_desc}}）

  相邻章节概览（按顺序排列）：
  {{adjacent_chapters}}

  项目中的角色：
  {{characters_summary}}

  项目中的主题：
  {{themes_summary}}

  # ——— 输出要求 ———
  请完成以下两步：
  1. reasoning：分析这一章在整体叙事弧中的位置，需要完成什么戏剧功能（50-100字）。
  2. goal：用一两句话写一个具体、可衡量的章节目标。

  # ——— 好的章节目标 vs 不好的章节目标 ———
  好的目标示例：
  - "主角在调查中发现关键线索（凶手留下的手表），同时与配角的信任关系出现裂缝。"
    ✅ 具体、有事件、有情感变化
  - "通过闪回揭示反派的童年创伤，让读者对反派产生共情。"
    ✅ 明确叙事手段和预期效果

  不好的目标示例：
  - "推进剧情发展。" ❌ 太模糊，没有可衡量标准
  - "让主角更强大。" ❌ 不知道具体在哪个维度、以什么方式
  - "写一些有趣的事情。" ❌ 没有具体事件导向
  - "揭示世界观。" ❌ 太宽泛，一章节无法完成

  # ——— 章节目标检查清单 ———
  ✅ 是否具体（有明确事件或变化）？
  ✅ 是否可衡量（写完后能判断是否达成）？
  ✅ 是否与章节位置匹配（开端/发展/高潮/结尾各司其职）？
  ✅ 是否服务于整体叙事弧？
  ✅ 是否涉及角色变化或关系变化？

  # ——— 输出格式 ———
  你的回答必须是一个合法的 JSON 对象，包含 "goal" 和 "reasoning" 两个字段，
  不要包含 markdown 代码块标记。

  {"reasoning": "本章处于第一幕高潮部分...",
   "goal": "主角在废墟中发现关键证据，被迫与导师正面对峙，两人的信任关系彻底破裂。"}
