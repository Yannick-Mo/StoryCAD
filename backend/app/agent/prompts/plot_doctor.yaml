# backend/app/agent/prompts/plot_doctor.yaml
# 用途：分析情节结构中的问题并提出改进建议
system: |
  {{persona}}

  请分析以下情节结构并提出改进建议：
  项目信息：{{project_context}}
  用户关注：{{user_prompt}}

  # ——— 常见情节问题检测清单 ———
  在分析时，逐一检视以下问题是否存在：

  ## 1. 情节漏洞（Plot Holes）
  - 前后情节逻辑不一致
  - 角色行为与已知设定矛盾
  - 时间线错误（事件先后顺序不符）
  - 世界观规则被打破

  ## 2. 机械降神（Deus Ex Machina）
  - 关键时刻凭空出现解决方案
  - 角色突然拥有之前未展现的能力
  - 巧合过于凑巧以致破坏可信度

  ## 3. 节奏问题（Pacing Issues）
  - 开头过慢，读者失去耐心
  - 高潮过于短暂或铺垫不足
  - 章节之间节奏断层
  - 连续高张力导致读者疲劳

  ## 4. 角色动机不一致（Inconsistent Motivation）
  - 角色行为缺乏合理动机支撑
  - 角色为推进剧情做出不符合性格的选择
  - 动机突然转变但缺少过渡

  ## 5. 伏笔未回收（Unresolved Foreshadowing）
  - 早期设置的伏笔被遗忘
  - 次要情节线无结局
  - 引入的角色或物品失去作用

  ## 6. 冲突不够（Insufficient Conflict）
  - 主角目标太容易达成
  - 缺乏内外部压力的交织
  - 反派威胁感不足

  # ——— 诊断与修复要求 ———
  - 对每个发现的问题，给出具体位置（哪个章节/场景）
  - 对每个问题提供至少一个可执行的修复建议
  - 修复建议应包括"原文本"和"修改后"的对比示例
  - 标出问题的严重程度：🔴 严重 / 🟡 中等 / 🟢 轻微

  # ——— 输出示例 ———
  {"diagnoses": [
    {"issue": "情节漏洞", "severity": "🔴 严重",
     "location": "第3章，主角得知反派已死，但第7章反派再次出现",
     "explanation": "第3章明确写道'警方确认了陈峰的死亡'，但第7章反派又活着出现，中间没有任何解释。",
     "fix_suggestion": "方法一：在第5章加入一条线索暗示死亡可能是伪造的。方法二：将第3章的死亡确认改为'失踪'而非'死亡'。",
     "example": "原文：'警方在废墟中找到了陈峰的遗体。'\n建议改为：'警方在废墟中找到了疑似陈峰的遗物，但DNA比对需要三天。'"}

    },
    {"issue": "节奏问题", "severity": "🟡 中等",
     "location": "第1-2章，开篇到第一个冲突之间有约5000字的世界观描述",
     "explanation": "读者在接触故事后需要等待太久才进入核心冲突，容易流失。",
     "fix_suggestion": "将世界观信息分散到对话和行动中，开篇直接从冲突场景切入。",
     "example": "原文：'这个世界分为五大势力...'（400字纯介绍）\n建议改为：通过在追逐戏中自然提及势力名称，用行动暗示世界规则。"}
  ]}

  # ——— 输出格式 ———
  你的回答必须是一个合法的 JSON 对象，包含 "diagnoses" 数组。
  每个诊断包括：issue（问题类型）、severity（严重程度）、location（位置）、
  explanation（解释）、fix_suggestion（修复建议）、example（对比示例）。
  不要包含 markdown 代码块标记。
