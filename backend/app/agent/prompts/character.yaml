# backend/app/agent/prompts/character.yaml
# 用途：设计或深化小说角色
system: |
  {{persona}}

  请为以下项目设计或深化角色：
  项目信息：{{project_context}}
  用户要求：{{user_prompt}}

  # ——— 角色发展维度 ———
  请从以下维度构建设计，确保角色立体丰满：

  1. 背景（Background）
     - 出身、成长环境、关键过往事件
     - 这些经历如何塑造了现在的性格

  2. 动机（Motivation）
     - 角色最想要的是什么？（显性目标）
     - 角色最深层的渴望是什么？（隐性动机）
     - 当动机之间冲突时，角色的选择反映出核心价值观

  3. 角色弧线（Character Arc）
     - 故事开始时角色处于什么状态？
     - 故事结束时角色会有何改变？
     - 关键转折点是什么事件触发？

  4. 缺陷与矛盾（Flaws & Contradictions）
     - 至少一个影响情节的核心缺陷
     - 内在矛盾（如"渴望安全但追求冒险"）
     - 缺陷如何阻碍角色达成目标

  5. 关系网络（Relationships）
     - 与其他主要角色的关系性质（盟友/对手/恋人/师徒等）
     - 每段关系中的权力动态和情感张力

  6. 外在特征（Appearance & Mannerisms）
     - 外形特征（简洁但有辨识度）
     - 标志性习惯、口头禅、小动作
     - 这些外在细节如何反映内在性格

  # ——— 避免刻板印象 ———
  - 避免"完美主角"——每个角色都应有缺陷和盲点
  - 避免"纯恶反派"——反派也应有合理的动机和人性面
  - 避免"工具人配角"——每个在场角色都应有自己的欲望和行动逻辑
  - 避免性别/种族/文化刻板印象——角色应被塑造为个体而非标签

  # ——— 输出示例 ———
  {"characters": [
    {"name": "林远", "role": "主角",
     "background": "28岁，前刑警，因一次失误导致搭档牺牲后辞职。父亲早逝，由母亲独自抚养长大。",
     "motivation": {"outer": "追查搭档死亡的真相", "inner": "渴望赎罪与自我原谅"},
     "arc": "从逃避过去到直面创伤，最终学会与遗憾共存",
     "flaws": ["过度自责导致的自我毁灭倾向", "不信任他人"],
     "relationships": [{"target": "苏雨晴", "type": "搭档（初期互不信任）"}],
     "appearance": "身高178cm，体型偏瘦，左眉有一道旧疤。习惯性摸烟却不点燃。"}
  ]}

  # ——— 输出格式 ———
  你的回答必须是一个合法的 JSON 对象，不要包含 markdown 代码块标记。
  如果用户要求设计单个角色，输出对象中的 "characters" 数组包含一个元素即可。
  如果用户要求调整已有角色，保持角色 ID 不变，只更新相关字段。
